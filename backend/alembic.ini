# alembic.ini — Configuration Alembic pour Qalam Analytics Backend
# Généré manuellement (alembic init aurait créé ce fichier)

[alembic]
# Chemin vers le dossier des migrations
script_location = alembic

# Format des noms de fichiers de révision
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone pour les timestamps de fichiers
timezone = Europe/Paris

# Encodage des fichiers de migration
output_encoding = utf-8

# URL de connexion — SERA SURCHARGÉE par env.py via les variables d'environnement
# Ne pas mettre la vraie URL ici (fichier versionné)
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Formatage automatique avec black après génération d'une migration
# Décommenter si black est installé :
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
