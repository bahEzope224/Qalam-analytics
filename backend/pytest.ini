[pytest]
# ── pytest-asyncio ──────────────────────────────────────────────────────────
# Strict mode: only coroutines decorated with @pytest.mark.asyncio are async.
asyncio_mode = strict
# Silence "asyncio_default_fixture_loop_scope is unset" deprecation warning.
asyncio_default_fixture_loop_scope = function

# ── sys.path ─────────────────────────────────────────────────────────────────
# Add the backend/ directory to sys.path so `app` is importable in tests.
# Requires pytest >= 7.0.
pythonpath = .

# ── test discovery ───────────────────────────────────────────────────────────
testpaths = tests
