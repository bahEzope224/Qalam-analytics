# ============================================================
#  GitHub Actions — CI Pipeline
#  Déclenchement : push / PR sur main et develop
#
#  Jobs :
#   1. lint-backend   — Ruff (linter Python)
#   2. test-backend   — Pytest avec PostgreSQL de service
#   3. lint-frontend  — ESLint (si configuré)
#   4. build-frontend — npm run build (vérification)
# ============================================================

name: CI — Lint & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ──────────────────────────────────────────────────────────
  # 1. Lint Python (Ruff)
  # ──────────────────────────────────────────────────────────
  lint-backend:
    name: 🐍 Lint Backend (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        working-directory: backend
        run: ruff check . --output-format=github


  # ──────────────────────────────────────────────────────────
  # 2. Tests Backend (Pytest + PostgreSQL)
  # ──────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend (Pytest)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qalam_test
          POSTGRES_PASSWORD: qalam_test_secret
          POSTGRES_DB: analytics_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://qalam_test:qalam_test_secret@localhost:5432/analytics_test_db
      SECRET_KEY: ci-test-secret-key-32chars-minimum
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENV: testing
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run Pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short


  # ──────────────────────────────────────────────────────────
  # 3. Build Frontend (Vite)
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: ⚛️ Build Frontend (Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
