# ============================================================
#  GitHub Actions — CD Pipeline
#  Déclenchement : push tag vX.Y.Z  OU  merge sur main (manuel)
#
#  Jobs :
#   1. build-push-backend  — Build & push image Docker backend
#   2. build-push-frontend — Build & push image Docker frontend
#   3. deploy              — SSH sur le serveur de production
#
#  Secrets GitHub requis :
#   DOCKERHUB_USERNAME    — votre username Docker Hub
#   DOCKERHUB_TOKEN       — token d'accès Docker Hub
#   DEPLOY_HOST           — IP ou hostname du serveur
#   DEPLOY_USER           — utilisateur SSH
#   DEPLOY_SSH_KEY        — clé privée SSH (RSA ou ED25519)
# ============================================================

name: CD — Build & Deploy

on:
  push:
    tags:
      - "v*.*.*"           # ex: v1.0.0, v2.3.1
  workflow_dispatch:       # déclenchement manuel depuis GitHub

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/qalam-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/qalam-frontend

jobs:

  # ──────────────────────────────────────────────────────────
  # 1. Build & Push — Backend
  # ──────────────────────────────────────────────────────────
  build-push-backend:
    name: 🐳 Docker Backend
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ──────────────────────────────────────────────────────────
  # 2. Build & Push — Frontend
  # ──────────────────────────────────────────────────────────
  build-push-frontend:
    name: ⚛️ Docker Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ──────────────────────────────────────────────────────────
  # 3. Déploiement sur serveur (SSH + Docker Compose)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-push-frontend]
    environment: production    # environnement GitHub avec règles d'approbation

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Aller dans le répertoire du projet
            cd /opt/qalam-analytics

            # Récupérer la dernière version de docker-compose.yml
            git pull origin main

            # Se connecter à Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Récupérer les nouvelles images
            docker compose pull backend frontend

            # Redémarrer les services sans interruption (zero-downtime)
            docker compose up -d --no-deps --remove-orphans backend frontend

            # Appliquer les migrations Alembic
            docker compose exec -T backend alembic upgrade head

            # Nettoyer les images non utilisées
            docker image prune -f

            echo "✅ Déploiement terminé — $(date)"
